<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="flex gap-8">

  <div class="bg-white p-6 rounded shadow w-80">
    <h1 class="text-2xl font-bold text-center mb-4">Signup</h1>
    <form>
        Full Name<span class="text-red-500">*</span>
        <input type="text" placeholder="Enter your full name" 
        required class="w-full border border-gray-300 rounded px-3 py-2 mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
        
        Email Address<span class="text-red-500">*</span>
        <input type="email" placeholder="Enter your email address" 
        required class="w-full border border-gray-300 rounded px-3 py-2 mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
        
        Password<span class="text-red-500">*</span>
        <input type="password" placeholder="Enter your password" 
        required class="w-full border border-gray-300 rounded px-3 py-2 mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
        
        Confirm Password<span class="text-red-500">*</span>
        <input type="password" placeholder="Confirm password" 
        required class="w-full border border-gray-300 rounded px-3 py-2 mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
        
        <button type="submit" 
        class="w-full bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-700 cursor-pointer">Signup</button>
        
        <p>Already have an account, <a href="login.html" 
        class="text-blue-500 hover:underline">Login</p>
    </form>
</div>
    
</body>
</html>
