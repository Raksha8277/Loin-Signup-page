<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-blue-400 via-white to-blue-500 flex items-center justify-center p-10">
  <div class=""></div>
    <div class="flex gap-8">

  <div class="bg-gray-100 shadow-lg rounded-2xl p-8 w-full max-w-md">

    <h2 class="text-2xl font-bold text-center mb-4">
      Forgot Password
    </h2>

    <p class="text-gray-600 text-sm text-center mb-4">
      Enter your email to reset password
    </p>

    <input type="email"
      placeholder="Enter your email"
      class="w-full px-4 py-2 border rounded-xl mb-4 focus:ring-2 focus:ring-purple-500 outline-none">

    <button
      class="w-full bg-blue-500 text-white py-2 rounded-xl hover:bg-blue-700 transition">
      Reset Password
    </button>

    <p class="text-center text-sm mt-4">
      <a href="index.html" class="text-blue-600 hover:underline">
        Back to Login
      </a>
    </p>

  </div>

</body>
</html>
