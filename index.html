<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>log-in </title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-blue-400 via-white to-blue-500 flex items-center justify-center p-10">
  <div class=""></div>
    <div class="flex gap-8">

  <div class="bg-gray-100 shadow-lg rounded-2xl p-8 w-full max-w-md">
    <h1 class="text-2xl font-bold text-center mb-4">Login</h1>
    <form >
       
        Email Address<span class="text-red-500">*</span>
        <input type="email" placeholder="Enter your email address" 
        required class="w-full border border-gray-300 rounded-2xl px-3 py-2 mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
       
        Password<span class="text-red-500">*</span>
        <input type="password" placeholder="Enter password" 
        required class="w-full border border-gray-300 rounded-2xl px-3 py-2 mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
        
        <button type="submit" 
        class="w-full bg-blue-500 text-white px-4 py-2 rounded-2xl hover:bg-blue-700 cursor-pointer">Login</button>
        
         <div class="text-right mb-4">
         <a href="forgot.html" class="text-sm text-black hover:text-blue-600 hover:underline">
         Forgot Password?
    </div>

        <p>Don't have an account, <a href="signup.html" class="text-blue-800 hover:underline">Signup</a></p>

        <div class="flex items-center my-4">
  <hr class="flex-grow border-gray-300">
  <span class="mx-2 text-gray-500 text-sm">OR</span>
  <hr class="flex-grow border-gray-300">
</div>

<!-- Google and GitHub in same line -->
<div class="flex gap-3">
  
  <button class="w-1/2 flex items-center justify-center gap-2 border border-gray-300 rounded-2xl py-2 hover:bg-gray-100 transition">
    <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5">
    <span class="text-sm font-medium text-gray-700">Google</span>
  </button>

  <button class="w-1/2 flex items-center justify-center gap-2 border border-gray-300 rounded-2xl py-2 hover:bg-gray-100 transition">
    <img src="https://www.svgrepo.com/show/512317/github-142.svg" class="w-5 h-5">
    <span class="text-sm font-medium text-gray-700">GitHub</span>
  </button>

</div>

    </form>
</body>
</html>
